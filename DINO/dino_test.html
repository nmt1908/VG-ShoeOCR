<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DINO Detection UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #0f2027 0%, #2c5364 100%);
            color: #fff;
            font-family: 'Orbitron', 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            width: 100vw;
            box-sizing: border-box;
        }
        .container {
            display: flex;
            flex-direction: row;
            width: 100vw;
            height: 100vh;
        }
        .left-panel {
            flex: 0 0 420px;
            max-width: 480px;
            min-width: 320px;
            padding: 40px 32px 32px 32px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            background: rgba(20, 20, 40, 0.85);
            box-shadow: 0 0 32px #00ffe733;
            z-index: 2;
        }
        .right-panel {
            flex: 1 1 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            min-width: 0;
            min-height: 0;
        }
        h2 {
            margin-top: 0;
            margin-bottom: 32px;
            font-size: 2.2em;
            letter-spacing: 2px;
            color: #00ffe7;
            text-shadow: 0 0 10px #00ffe7, 0 0 20px #0ff;
        }
        #drop-area {
            border: 2px dashed #00ffe7;
            border-radius: 18px;
            width: 100%;
            height: 180px;
            text-align: center;
            line-height: 180px;
            color: #00ffe7cc;
            margin-bottom: 18px;
            background: rgba(20, 20, 40, 0.7);
            box-shadow: 0 0 24px #00ffe7aa, 0 0 8px #0ff;
            transition: border-color 0.2s;
            cursor: pointer;
            font-size: 1.2em;
            letter-spacing: 1px;
        }
        #drop-area:hover {
            border-color: #ff00cc;
            color: #ff00cc;
            box-shadow: 0 0 32px #ff00cc99, 0 0 8px #0ff;
        }
        .input-label {
            margin-top: 10px;
            margin-bottom: 4px;
            font-size: 1em;
            color: #00ffe7;
            text-shadow: 0 0 6px #00ffe7;
            letter-spacing: 1px;
        }
        .input-label.secondary {
            color: #ff00cc;
            text-shadow: 0 0 6px #ff00cc;
        }
        .keyword-input {
            width: 90%;
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            background: #181828;
            color: #00ffe7;
            font-size: 1.1em;
            margin-bottom: 10px;
            outline: none;
            box-shadow: 0 0 8px #00ffe7aa;
            font-family: 'Orbitron', 'Segoe UI', Arial, sans-serif;
            transition: box-shadow 0.2s, color 0.2s;
        }
        .keyword-input:focus {
            box-shadow: 0 0 16px #ff00cc99;
            color: #ff00cc;
        }
        .keyword-input.secondary {
            color: #ff00cc;
            box-shadow: 0 0 8px #ff00ccaa;
        }
        .keyword-input.secondary:focus {
            box-shadow: 0 0 16px #00ffe799;
            color: #00ffe7;
        }
        #submit-btn {
            padding: 12px 32px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(90deg, #00ffe7 0%, #ff00cc 100%);
            color: #181828;
            font-size: 1.1em;
            font-family: 'Orbitron', 'Segoe UI', Arial, sans-serif;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 0 12px #00ffe7aa, 0 0 8px #ff00cc99;
            transition: background 0.2s, color 0.2s;
            margin-bottom: 18px;
            margin-top: 10px;
            width: 100%;
        }
        #submit-btn:hover {
            background: linear-gradient(90deg, #ff00cc 0%, #00ffe7 100%);
            color: #fff;
            box-shadow: 0 0 24px #ff00cc99, 0 0 8px #00ffe7aa;
        }
        #message {
            margin-top: 8px;
            font-size: 1.1em;
            min-height: 24px;
            text-shadow: 0 0 8px #0ff;
            width: 100%;
        }
        #canvas-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            background: rgba(10, 10, 30, 0.8);
            box-shadow: 0 0 24px #00ffe7aa, 0 0 8px #0ff;
            border-radius: 12px;
            overflow: auto;
        }
        #result-canvas {
            border: 2px solid #ff00cc;
            border-radius: 12px;
            background: #181828;
            box-shadow: 0 0 16px #ff00cc99, 0 0 4px #0ff;
            max-width: 100%;
            max-height: 100vh;
            height: 100vh;
            width: auto;
            display: block;
        }
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }
            .left-panel {
                width: 100vw;
                max-width: 100vw;
                min-width: 0;
                box-shadow: none;
                align-items: center;
            }
            .right-panel {
                width: 100vw;
                min-width: 0;
            }
            #canvas-container {
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <h2>DINO Object Detection</h2>
            <div id="drop-area">Drag & Drop Image Here or Click to Select</div>
            <input type="file" id="file-input" accept="image/*" style="display:none;">
            <label class="input-label" for="keyword-input">Keywords</label>
            <input type="text" id="keyword-input" class="keyword-input" placeholder="Enter keywords (e.g. dog, cat)" value="small mold number">
            <label class="input-label" for="box-threshold" style="margin-top:18px;">Box Threshold: <span id="box-threshold-value">0.2</span></label>
            <input type="range" id="box-threshold" min="0" max="1" step="0.01" value="0.2" style="width:90%;margin-bottom:10px;">
            <label class="input-label" for="text-threshold">Text Threshold: <span id="text-threshold-value">0.3</span></label>
            <input type="range" id="text-threshold" min="0" max="1" step="0.01" value="0.3" style="width:90%;margin-bottom:10px;">
            <button id="submit-btn">Detect</button>
            <div id="message"></div>
        </div>
        <div class="right-panel">
            <div id="canvas-container">
                <canvas id="result-canvas"></canvas>
            </div>
        </div>
    </div>
    <script>
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const canvas = document.getElementById('result-canvas');
        const ctx = canvas.getContext('2d');
        let imageFile = null;
        let imageObj = new Image();
        let allDetections = [];

        // Drag & drop handlers
        dropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropArea.style.borderColor = '#ff00cc';
            dropArea.style.color = '#ff00cc';
            dropArea.style.boxShadow = '0 0 32px #ff00cc99, 0 0 8px #0ff';
        });
        dropArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropArea.style.borderColor = '#00ffe7';
            dropArea.style.color = '#00ffe7cc';
            dropArea.style.boxShadow = '0 0 24px #00ffe7aa, 0 0 8px #0ff';
        });
        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropArea.style.borderColor = '#00ffe7';
            dropArea.style.color = '#00ffe7cc';
            dropArea.style.boxShadow = '0 0 24px #00ffe7aa, 0 0 8px #0ff';
            if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                handleFile(e.dataTransfer.files[0]);
            }
        });
        dropArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showMessage('Please select an image file.', true);
                return;
            }
            imageFile = file;
            const reader = new FileReader();
            reader.onload = function(evt) {
                imageObj.onload = function() {
                    // Set canvas size to fit 100vh, keep aspect ratio
                    let aspect = imageObj.width / imageObj.height;
                    canvas.height = window.innerHeight;
                    canvas.width = Math.round(canvas.height * aspect);
                    ctx.drawImage(imageObj, 0, 0, canvas.width, canvas.height);
                }
                imageObj.src = evt.target.result;
            }
            reader.readAsDataURL(file);
            showMessage('');
        }

        const boxThresholdSlider = document.getElementById('box-threshold');
        const textThresholdSlider = document.getElementById('text-threshold');
        const boxThresholdValue = document.getElementById('box-threshold-value');
        const textThresholdValue = document.getElementById('text-threshold-value');

        boxThresholdSlider.oninput = function() {
            boxThresholdValue.textContent = this.value;
        };
        textThresholdSlider.oninput = function() {
            textThresholdValue.textContent = this.value;
        };

        document.getElementById('submit-btn').onclick = async function() {
            const keywords = document.getElementById('keyword-input').value;
            const boxThreshold = parseFloat(boxThresholdSlider.value);
            const textThreshold = parseFloat(textThresholdSlider.value);
            if (!imageFile) {
                showMessage('Please select or drop an image.', true);
                return;
            }
            if (!keywords.trim()) {
                showMessage('Please enter keywords.', true);
                return;
            }
            allDetections = [];
            showMessage('Detecting...');
            const formData = new FormData();
            formData.append('image', imageFile);
            formData.append('keywords', keywords);
            formData.append('box_threshold', boxThreshold);
            formData.append('text_threshold', textThreshold);
            try {
                const response = await fetch('http://10.13.33.50:8000/embossed_detect', {
                    method: 'POST',
                    body: formData
                });
                if (!response.ok) throw new Error('Detection failed');
                const data = await response.json();
                allDetections = data.detections;
                drawDetections(allDetections);
                showMessage('Detection complete.');
            } catch (err) {
                showMessage('Error: ' + err.message, true);
            }
        };

        function drawDetections(detections) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(imageObj, 0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 3;
            ctx.font = "bold 18px Orbitron, Arial, sans-serif";
            let xScale = canvas.width / imageObj.width;
            let yScale = canvas.height / imageObj.height;
            detections.forEach(det => {
                let [xmin, ymin, xmax, ymax] = det.box;
                xmin *= xScale;
                xmax *= xScale;
                ymin *= yScale;
                ymax *= yScale;
                // Draw bounding box
                ctx.shadowColor = "#00ffe7";
                ctx.shadowBlur = 10;
                ctx.strokeStyle = "#00ffe7";
                ctx.beginPath();
                ctx.rect(xmin, ymin, xmax - xmin, ymax - ymin);
                ctx.stroke();
                ctx.shadowBlur = 0;
                // Draw label background (top left)
                ctx.fillStyle = "rgba(255,0,204,0.85)";
                ctx.fillRect(xmin, ymin - 26, ctx.measureText(det.label).width + 18, 26);
                ctx.shadowColor = "#ff00cc";
                ctx.shadowBlur = 8;
                ctx.fillStyle = "#fff";
                ctx.fillText(det.label, xmin + 8, ymin - 8);
                ctx.shadowBlur = 0;
                // Draw score box (outer right corner)
                if (det.label.includes('(') && det.label.includes(')')) {
                    // Extract score from label
                    let scoreText = det.label.match(/\(([^)]+)\)$/);
                    scoreText = scoreText ? scoreText[1] : '';
                    let scoreBoxWidth = ctx.measureText(scoreText).width + 18;
                    let scoreBoxHeight = 26;
                    let scoreX = xmax + 4;
                    let scoreY = ymin - 26;
                    // Make sure score box is within canvas
                    if (scoreY < 0) scoreY = ymin + 4;
                    ctx.fillStyle = "rgba(0,255,128,0.85)";
                    ctx.fillRect(scoreX, scoreY, scoreBoxWidth, scoreBoxHeight);
                    ctx.shadowColor = "#00ffe7";
                    ctx.shadowBlur = 8;
                    ctx.fillStyle = "#181828";
                    ctx.fillText(scoreText, scoreX + 8, scoreY + scoreBoxHeight - 8);
                    ctx.shadowBlur = 0;
                }
            });
        }

        function showMessage(msg, isError) {
            const div = document.getElementById('message');
            div.textContent = msg;
            div.style.color = isError ? '#ff00cc' : '#00ffe7';
            div.style.textShadow = isError
                ? '0 0 8px #ff00cc, 0 0 16px #ff00cc'
                : '0 0 8px #00ffe7, 0 0 16px #0ff';
        }
    </script>
</body>
</html>
